name: Canli Skor Guncelle v2

# Botun ne zaman çalışacağını belirliyoruz
on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı (0. dakikada) otomatik çalışır
  workflow_dispatch:     # İsterseniz test etmek için "Şimdi Çalıştır" butonunu açar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Adım: GitHub deponuzdaki kodları sunucuya indirir
    - name: Depoyu Klonla
      uses: actions/checkout@v3

    # 2. Adım: Sunucuya Python yükler
    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Adım: Kodun çalışması için gerekli kütüphaneleri (requests) yükler
    - name: Gerekli Kütüphaneleri Yükle
      run: |
        pip install requests

    # 4. Adım: Python kodunuzu çalıştırır
    - name: Botu Calistir
      run: python hked_canli.py
